name: GitHub Profile Summary Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths:
      - .github/workflows/profile-summary-cards.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    steps:
      - uses: actions/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # Prefer a classic PAT with read:user, user:email, public_repo (see project wiki).
          # Falls back to GITHUB_TOKEN if the secret is not set (may hit API limits on large profiles).
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          # Use ref_name so schedule events work (repository.default_branch is often empty on schedule).
          BRANCH_NAME: ${{ github.ref_name }}
          UTC_OFFSET: 8
          EXCLUDE: ""
          AUTO_PUSH: true
